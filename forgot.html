<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>
<style>
body { margin:0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg,#81C784,#2E7D32); height:100vh; display:flex; justify-content:center; align-items:center; }
.container { background:white; padding:40px 50px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.3); text-align:center; width:350px; }
h2 { color:#2E7D32; margin-bottom:30px; font-weight:600; }
input { width:90%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ccc; font-size:16px; }
button { width:95%; padding:12px; margin-top:15px; border:none; border-radius:8px; background:#4CAF50; color:white; font-size:16px; cursor:pointer; }
button:hover { background:#388E3C; }
p { margin-top:15px; font-size:14px; }
.message { margin-top:10px; font-weight:bold; color:#2E7D32; }
a { color:#2E7D32; text-decoration:none; font-weight:600; }
a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="container">
<h2>Forgot Password</h2>
<form method="POST">
<input name="username" placeholder="Enter Username" required><br>
<button type="submit">Retrieve Password</button>
</form>
{% if message %}<div class="message">{{ message }}</div>{% endif %}
<p><a href="/">Back to Login</a></p>
</div>
</body>
</html>
