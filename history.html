 <!DOCTYPE html>
<html>
<head>
<title>Patient History</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background:#eef2f7; margin:0; padding:0; }
.header { background:#2e7d32; color:white; padding:20px; text-align:center; font-size:28px; font-weight:bold; }
.container { width:90%; margin:40px auto; }
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ddd; padding:10px; text-align:center; }
th { background:#4CAF50; color:white; }
tr:nth-child(even){background:#f2f2f2;}
a { color:#2E7D32; text-decoration:none; font-weight:600; }
a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="header">Patient Prediction History</div>
<div class="container">
<a href="/home">← Back to Home</a>
<table>
<tr>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Prediction</th>
<th>Probability</th>
<th>Date</th>
</tr>
{% for row in rows %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>
</tr>
{% endfor %}
</table>
</div>
</body>
</html>
