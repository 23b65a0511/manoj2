<!DOCTYPE html>
<html>
<head>
    <title>Login - Lung Cancer Detection</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #81C784, #2E7D32);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            width: 350px;
        }
        h2 { color: #2E7D32; margin-bottom: 30px; font-weight: 600; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { width: 95%; padding: 12px; margin-top: 15px; border: none; border-radius: 8px; background: #4CAF50; color: white; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #388E3C; }
        p { margin-top: 15px; font-size: 14px; }
        a { color: #2E7D32; text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }
        .error { color: red; margin-top: 10px; font-size: 14px; }
        .forgot { display: block; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>
<div class="login-container">
    <h2>Login</h2>
    <form method="POST" action="/login">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <a class="forgot" href="/forgot_password">Forgot Password?</a>
    <p>Don't have an account? <a href="/register">Register</a></p>
</div>
</body>
</html>
